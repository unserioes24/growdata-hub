<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GrowData Hub</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #2d7a3a;
    --green-light: #e8f5e9;
    --green-mid: #4caf50;
    --gray: #f5f5f5;
    --border: #e0e0e0;
    --text: #212121;
    --muted: #757575;
    --accent: #1b5e20;
    --tag-bg: #e8f5e9;
    --tag-text: #2d7a3a;
  }

  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px; color: var(--text); background: #fafafa; }

  header {
    background: var(--green); color: #fff;
    padding: 0 20px; height: 52px;
    display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 4px rgba(0,0,0,.15);
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: .3px; flex: none; }
  header .emoji { font-size: 22px; }
  #search {
    flex: 1; max-width: 480px; height: 34px;
    border: 1px solid rgba(255,255,255,.4); border-radius: 6px;
    padding: 0 12px; font-size: 14px; background: rgba(255,255,255,.15);
    color: #fff; outline: none;
  }
  #search::placeholder { color: rgba(255,255,255,.6); }
  #search:focus { background: rgba(255,255,255,.25); border-color: rgba(255,255,255,.7); }
  .header-right { margin-left: auto; font-size: 12px; opacity: .75; }

  .layout { display: flex; height: calc(100vh - 52px); overflow: hidden; }

  /* Sidebar */
  aside {
    width: 210px; flex: none;
    border-right: 1px solid var(--border);
    background: #fff; overflow-y: auto; padding: 12px 0;
  }
  .cat-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; cursor: pointer; border-radius: 0;
    transition: background .1s; gap: 6px;
  }
  .cat-item:hover { background: var(--green-light); }
  .cat-item.active { background: var(--green-light); font-weight: 600; color: var(--accent); }
  .cat-label { font-size: 13px; flex: 1; }
  .cat-count { font-size: 11px; color: var(--muted); background: var(--gray);
    border-radius: 10px; padding: 1px 7px; }
  .sidebar-section { padding: 10px 14px 4px; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .8px; color: var(--muted); }
  .brand-item { padding: 5px 14px; cursor: pointer; font-size: 13px;
    color: var(--muted); border-radius: 0; }
  .brand-item:hover { background: var(--green-light); color: var(--text); }
  .brand-item.active { color: var(--accent); font-weight: 600; }

  /* Main area */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .toolbar {
    padding: 10px 16px; border-bottom: 1px solid var(--border); background: #fff;
    display: flex; align-items: center; gap: 10px; flex: none;
  }
  .result-count { font-size: 13px; color: var(--muted); }
  .sort-select {
    margin-left: auto; font-size: 13px; border: 1px solid var(--border);
    border-radius: 5px; padding: 4px 8px; background: #fff; cursor: pointer;
  }

  .product-list {
    flex: 1; overflow-y: auto; padding: 8px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    align-content: start; gap: 8px;
  }
  .product-card {
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; cursor: pointer; transition: box-shadow .15s, border-color .15s;
  }
  .product-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); border-color: var(--green-mid); }
  .product-card.selected { border-color: var(--green); box-shadow: 0 0 0 2px var(--green-light); }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .card-model { font-size: 14px; font-weight: 600; line-height: 1.3; }
  .card-brand { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .card-series { font-size: 12px; color: var(--muted); }
  .status-badge {
    font-size: 10px; font-weight: 600; border-radius: 4px;
    padding: 2px 6px; flex: none; text-transform: uppercase; letter-spacing: .4px;
  }
  .status-active { background: #e8f5e9; color: #2e7d32; }
  .status-discontinued { background: #fce4ec; color: #c62828; }
  .status-other { background: #f5f5f5; color: #757575; }
  .card-specs { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .spec-chip {
    font-size: 11px; background: var(--gray); border-radius: 4px;
    padding: 2px 7px; color: var(--text);
  }
  .spec-chip strong { color: var(--accent); }
  .card-price { margin-top: 8px; font-size: 13px; font-weight: 600; color: var(--accent); }

  /* Detail panel */
  .detail-panel {
    display: none; width: 380px; flex: none;
    border-left: 1px solid var(--border); background: #fff;
    overflow-y: auto; flex-direction: column;
  }
  .detail-panel.open { display: flex; }
  .detail-header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: #fff; z-index: 1;
  }
  .detail-header h2 { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
  .detail-header .sub { font-size: 12px; color: var(--muted); }
  .close-btn {
    position: absolute; top: 12px; right: 12px;
    background: none; border: none; font-size: 18px; cursor: pointer;
    color: var(--muted); padding: 4px 8px; border-radius: 4px;
  }
  .close-btn:hover { background: var(--gray); }
  .detail-body { padding: 12px 16px; }
  .field-group { margin-bottom: 14px; }
  .field-group-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .7px; color: var(--muted); margin-bottom: 6px;
    padding-bottom: 4px; border-bottom: 1px solid var(--border);
  }
  .field-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 3px 0; gap: 8px;
  }
  .field-key { font-size: 12px; color: var(--muted); flex: 1; }
  .field-val { font-size: 13px; font-weight: 500; text-align: right; word-break: break-word; max-width: 55%; }
  .field-val.bool-true { color: #2e7d32; }
  .field-val.bool-false { color: #c62828; }
  .field-val.link a { color: var(--green); word-break: break-all; }
  .compat-device { border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; margin-bottom: 6px; font-size: 12px; }
  .compat-device strong { font-size: 13px; display: block; margin-bottom: 3px; }

  /* Empty / loading */
  .center-msg {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; color: var(--muted); gap: 8px;
  }
  .center-msg .icon { font-size: 40px; }
  .center-msg p { font-size: 14px; }
  #loading { display: flex; }
  #empty { display: none; }

  @media (max-width: 700px) {
    aside { width: 0; display: none; }
    .detail-panel { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <span class="emoji">🌱</span>
  <h1>GrowData Hub</h1>
  <input type="search" id="search" placeholder="Search products, brands, series…" autocomplete="off">
  <span class="header-right" id="header-count"></span>
</header>

<div class="layout">
  <aside id="sidebar">
    <div class="cat-item active" data-cat="">
      <span class="cat-label">All Categories</span>
      <span class="cat-count" id="cnt-all">—</span>
    </div>
  </aside>

  <main>
    <div class="toolbar">
      <span class="result-count" id="result-count"></span>
      <select class="sort-select" id="sort-select">
        <option value="model">Sort: Model A–Z</option>
        <option value="brand">Sort: Brand A–Z</option>
        <option value="status">Sort: Status</option>
      </select>
    </div>
    <div class="product-list" id="product-list">
      <div class="center-msg" id="loading">
        <div class="icon">⏳</div>
        <p>Loading data…</p>
      </div>
      <div class="center-msg" id="empty" style="display:none">
        <div class="icon">🔍</div>
        <p>No products found</p>
      </div>
    </div>
  </main>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <h2 id="detail-title">—</h2>
      <div class="sub" id="detail-sub">—</div>
      <button class="close-btn" id="close-detail">✕</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
const CATEGORY_LABELS = {
  'carbon-filters': 'Carbon Filters',
  'circulation-fans': 'Circulation Fans',
  'grow-controller-accessories': 'Controller Accessories',
  'grow-controller-compatibility': 'Controller Compatibility',
  'grow-controllers': 'Grow Controllers',
  'grow-light-fixtures': 'Light Fixtures',
  'grow-tents': 'Grow Tents',
  'inline-duct-fans': 'Inline Duct Fans',
};

const CATEGORY_ORDER = Object.keys(CATEGORY_LABELS);

// Fields to show per category in the card chips
const CAT_SPECS = {
  'carbon-filters': (p) => [
    p.flange_diameter_mm != null && `Ø ${p.flange_diameter_mm}mm`,
    p.max_airflow_m3_h != null && `${p.max_airflow_m3_h} m³/h`,
    p.carbon_weight_kg != null && `${p.carbon_weight_kg}kg carbon`,
  ],
  'circulation-fans': (p) => [
    p.max_airflow_m3_h != null && `${p.max_airflow_m3_h} m³/h`,
    p.power_watts_max != null && `${p.power_watts_max}W`,
    p.oscillation != null && (p.oscillation === true ? 'oscillating' : null),
  ],
  'grow-controllers': (p) => [
    p.controller_type,
    p.app_control === true && 'app control',
    p.wifi === true && 'WiFi',
    p.ai_features === true && 'AI',
  ],
  'grow-controller-compatibility': (p) => [
    p.compatible_devices && `${p.compatible_devices.length} compatible devices`,
  ],
  'grow-controller-accessories': (p) => [
    p.compatible_series && `for ${p.compatible_series}`,
  ],
  'grow-light-fixtures': (p) => [
    p.power_watts != null && `${p.power_watts}W`,
    p.ppf_umol_s != null && `${p.ppf_umol_s} µmol/s`,
    p.efficacy_umol_j != null && `${p.efficacy_umol_j} µmol/J`,
  ],
  'grow-tents': (p) => [
    p.width_cm != null && p.depth_cm != null && p.height_cm != null
      && `${p.width_cm}×${p.depth_cm}×${p.height_cm}cm`,
    p.area_m2 != null && `${p.area_m2} m²`,
  ],
  'inline-duct-fans': (p) => [
    p.flange_diameter_mm != null && `Ø ${p.flange_diameter_mm}mm`,
    p.max_airflow_m3_h != null && `${p.max_airflow_m3_h} m³/h`,
    p.power_watts_max != null && `${p.power_watts_max}W`,
  ],
};

function modelName(p) {
  return p.model || p.name || p.controller_model || '—';
}

function statusClass(s) {
  if (!s) return 'status-other';
  if (s === 'active') return 'status-active';
  if (s === 'discontinued') return 'status-discontinued';
  return 'status-other';
}

function priceStr(p) {
  if (p.uvp_amount == null) return null;
  const cur = p.uvp_currency || '';
  return cur === 'EUR' ? `€${p.uvp_amount}` : `${p.uvp_amount} ${cur}`;
}

let allProducts = [];
let activeCategory = '';
let activeBrand = '';
let selectedProduct = null;
let sortField = 'model';

function getFilteredProducts() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return allProducts.filter(p => {
    if (activeCategory && p._category !== activeCategory) return false;
    if (activeBrand && (p.brand || '').toLowerCase() !== activeBrand) return false;
    if (!q) return true;
    const hay = JSON.stringify(p).toLowerCase();
    return q.split(/\s+/).every(t => hay.includes(t));
  });
}

function sortProducts(arr) {
  return [...arr].sort((a, b) => {
    if (sortField === 'brand') {
      const ba = (a.brand || '').toLowerCase(), bb = (b.brand || '').toLowerCase();
      return ba < bb ? -1 : ba > bb ? 1 : 0;
    }
    if (sortField === 'status') {
      const sa = a.status || 'z', sb = b.status || 'z';
      return sa < sb ? -1 : sa > sb ? 1 : 0;
    }
    const ma = modelName(a).toLowerCase(), mb = modelName(b).toLowerCase();
    return ma < mb ? -1 : ma > mb ? 1 : 0;
  });
}

function renderList() {
  const filtered = sortProducts(getFilteredProducts());
  const list = document.getElementById('product-list');
  const loading = document.getElementById('loading');
  const empty = document.getElementById('empty');
  loading.style.display = 'none';

  // Remove old cards
  [...list.querySelectorAll('.product-card')].forEach(el => el.remove());

  document.getElementById('result-count').textContent =
    `${filtered.length.toLocaleString()} product${filtered.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  const frag = document.createDocumentFragment();
  for (const p of filtered) {
    const card = document.createElement('div');
    card.className = 'product-card' + (p === selectedProduct ? ' selected' : '');
    const status = p.status || '';
    const specs = (CAT_SPECS[p._category] ? CAT_SPECS[p._category](p) : []).filter(Boolean);
    const price = priceStr(p);
    card.innerHTML = `
      <div class="card-brand">${p.brand || ''}${p.series ? ` · ${p.series}` : ''}</div>
      <div class="card-header">
        <div class="card-model">${modelName(p)}</div>
        ${status ? `<span class="status-badge ${statusClass(status)}">${status}</span>` : ''}
      </div>
      ${specs.length ? `<div class="card-specs">${specs.map(s =>
        `<span class="spec-chip">${s}</span>`).join('')}</div>` : ''}
      ${price ? `<div class="card-price">${price}</div>` : ''}
    `;
    card.addEventListener('click', () => showDetail(p, card));
    frag.appendChild(card);
  }
  list.appendChild(frag);
}

function buildSidebar(products) {
  const sidebar = document.getElementById('sidebar');
  document.getElementById('cnt-all').textContent = products.length;

  const cats = CATEGORY_ORDER.filter(c => products.some(p => p._category === c));
  for (const cat of cats) {
    const count = products.filter(p => p._category === cat).length;
    const el = document.createElement('div');
    el.className = 'cat-item';
    el.dataset.cat = cat;
    el.innerHTML = `<span class="cat-label">${CATEGORY_LABELS[cat]}</span>
      <span class="cat-count">${count}</span>`;
    el.addEventListener('click', () => {
      activeCategory = cat;
      activeBrand = '';
      document.querySelectorAll('.cat-item').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      updateBrandFilter(products);
      renderList();
    });
    sidebar.appendChild(el);
  }

  // "All" click
  sidebar.querySelector('[data-cat=""]').addEventListener('click', () => {
    activeCategory = '';
    activeBrand = '';
    document.querySelectorAll('.cat-item').forEach(e => e.classList.remove('active'));
    sidebar.querySelector('[data-cat=""]').classList.add('active');
    updateBrandFilter(products);
    renderList();
  });
}

function updateBrandFilter(products) {
  const sidebar = document.getElementById('sidebar');
  sidebar.querySelectorAll('.brand-section, .brand-item, .sidebar-section').forEach(e => e.remove());

  const scope = activeCategory
    ? products.filter(p => p._category === activeCategory)
    : products;

  const brands = [...new Set(scope.map(p => p.brand).filter(Boolean))].sort();
  if (brands.length < 2) return;

  const title = document.createElement('div');
  title.className = 'sidebar-section';
  title.textContent = 'Brand';
  sidebar.appendChild(title);

  for (const brand of brands) {
    const el = document.createElement('div');
    el.className = 'brand-item' + (activeBrand === brand.toLowerCase() ? ' active' : '');
    el.textContent = brand;
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      if (activeBrand === brand.toLowerCase()) {
        activeBrand = '';
        el.classList.remove('active');
      } else {
        sidebar.querySelectorAll('.brand-item').forEach(b => b.classList.remove('active'));
        activeBrand = brand.toLowerCase();
        el.classList.add('active');
      }
      renderList();
    });
    sidebar.appendChild(el);
  }
}

// ---- Detail panel ----

const FIELD_GROUPS = {
  'carbon-filters': [
    ['Product', ['brand','series','model','status','confidence_level']],
    ['Specs', ['flange_diameter_mm','height_mm','carbon_weight_kg','carbon_type',
      'min_airflow_m3_h','recommended_airflow_m3_h','max_airflow_m3_h',
      'humidity_limit_percent','lifetime_months_min','lifetime_months_max']],
    ['Price', ['uvp_amount','uvp_currency','uvp_source_url']],
    ['Source', ['source_url','source_type','source_date','notes']],
  ],
  'circulation-fans': [
    ['Product', ['brand','series','model','status','confidence_level']],
    ['Performance', ['max_airflow_m3_h','noise_db_min','noise_db_max','power_watts_min','power_watts_max','rpm_min','rpm_max']],
    ['Features', ['oscillation','oscillation_degrees','speed_levels','fan_type']],
    ['Price', ['uvp_amount','uvp_currency']],
    ['Source', ['source_url','source_type','source_date','notes']],
  ],
  'grow-controllers': [
    ['Product', ['brand','series','model','revision','status','controller_type']],
    ['Sensing', ['sensor_temperature','sensor_humidity','sensor_vpd','sensor_co2','sensor_light']],
    ['Control', ['control_temperature','control_humidity','control_vpd','control_fan_speed','control_light_schedule','control_light_dimming','control_co2','control_heater','control_humidifier','control_dehumidifier']],
    ['Connectivity', ['app_control','wifi','bluetooth','cloud_required','local_control','api_available','mqtt_available']],
    ['AI', ['ai_features','ai_feature_type','ai_grow_assistant','ai_climate_optimization','ai_vpd_optimization']],
    ['Price', ['uvp_amount','uvp_currency']],
    ['Source', ['source_url','source_type','source_date','confidence_level','notes']],
  ],
  'grow-light-fixtures': [
    ['Product', ['brand','series','model','revision','status','fixture_role']],
    ['Performance', ['power_watts','ppf_umol_s','efficacy_umol_j','ppfd_umol_m2_s','ppfd_distance_cm']],
    ['Coverage', ['area_width_cm','area_depth_cm']],
    ['Price', ['uvp_amount','uvp_currency']],
    ['Source', ['technical_source_url','source_type','source_date','confidence_level','notes']],
  ],
  'grow-tents': [
    ['Product', ['brand','series','model','status']],
    ['Dimensions', ['width_cm','depth_cm','height_cm','area_m2','volume_m3']],
    ['Build', ['fabric_thickness_d','reflective_material','reflectivity_percent','frame_material','pole_diameter_mm','max_load_kg']],
    ['Features', ['door_count','viewing_window','floor_tray_included','duct_ports_count','duct_port_sizes_mm','cable_ports_count']],
    ['Price', ['uvp_amount','uvp_currency']],
    ['Source', ['source_url','source_type','source_date','confidence_level','notes']],
  ],
  'inline-duct-fans': [
    ['Product', ['brand','series','model','status','fan_type','motor_type']],
    ['Performance', ['flange_diameter_mm','max_airflow_m3_h','recommended_airflow_m3_h','static_pressure_pa','noise_db_min','noise_db_max','power_watts_min','power_watts_max']],
    ['Control', ['speed_control_type','controller_included','app_control','wifi','bluetooth']],
    ['Physical', ['length_mm','diameter_mm','weight_kg']],
    ['Price', ['uvp_amount','uvp_currency']],
    ['Source', ['source_url','source_type','source_date','confidence_level','notes']],
  ],
  'grow-controller-accessories': [
    ['Product', ['brand','compatible_series','name','status']],
    ['Source', ['source_url','source_type','source_date','confidence_level','notes']],
  ],
};

function fieldLabel(key) {
  return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function fieldValueEl(key, val) {
  const span = document.createElement('span');
  span.className = 'field-val';
  if (val === null || val === undefined) {
    span.textContent = '—'; span.style.color = '#bdbdbd'; return span;
  }
  if (typeof val === 'boolean') {
    span.textContent = val ? 'Yes' : 'No';
    span.classList.add(val ? 'bool-true' : 'bool-false');
    return span;
  }
  if (typeof val === 'string' && (key.endsWith('_url') || key === 'technical_source_url')) {
    span.className += ' link';
    const a = document.createElement('a');
    a.href = val; a.target = '_blank'; a.rel = 'noopener'; a.textContent = 'Link ↗';
    span.appendChild(a); return span;
  }
  span.textContent = String(val);
  return span;
}

function showDetail(p, cardEl) {
  selectedProduct = p;
  document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
  if (cardEl) cardEl.classList.add('selected');

  document.getElementById('detail-title').textContent = modelName(p);
  document.getElementById('detail-sub').textContent =
    [CATEGORY_LABELS[p._category], p.brand, p.series].filter(Boolean).join(' · ');

  const body = document.getElementById('detail-body');
  body.innerHTML = '';

  if (p._category === 'grow-controller-compatibility') {
    renderCompatDetail(p, body);
  } else {
    const groups = FIELD_GROUPS[p._category] || [['Fields', Object.keys(p).filter(k => !k.startsWith('_'))]];
    for (const [title, fields] of groups) {
      const section = document.createElement('div');
      section.className = 'field-group';
      const heading = document.createElement('div');
      heading.className = 'field-group-title'; heading.textContent = title;
      section.appendChild(heading);
      let hasContent = false;
      for (const f of fields) {
        if (!(f in p) || p[f] === null) continue;
        hasContent = true;
        const row = document.createElement('div'); row.className = 'field-row';
        const key = document.createElement('span'); key.className = 'field-key'; key.textContent = fieldLabel(f);
        row.appendChild(key); row.appendChild(fieldValueEl(f, p[f]));
        section.appendChild(row);
      }
      if (hasContent) body.appendChild(section);
    }
  }

  document.getElementById('detail-panel').classList.add('open');
}

function renderCompatDetail(p, body) {
  const devices = p.compatible_devices || [];
  const info = document.createElement('div');
  info.className = 'field-group';
  info.innerHTML = `<div class="field-group-title">Controller</div>
    <div class="field-row"><span class="field-key">Model</span><span class="field-val">${p.controller_model}</span></div>
    <div class="field-row"><span class="field-key">Compatible devices</span><span class="field-val">${devices.length}</span></div>`;
  body.appendChild(info);

  const listSection = document.createElement('div');
  listSection.className = 'field-group';
  listSection.innerHTML = '<div class="field-group-title">Compatible Devices</div>';
  for (const d of devices) {
    const div = document.createElement('div'); div.className = 'compat-device';
    const name = [d.compatible_brand, d.compatible_series, d.compatible_model_examples]
      .filter(Boolean).join(' · ') || d.compatible_product_category || '—';
    div.innerHTML = `<strong>${name}</strong>
      ${d.compatibility_level ? `Level: ${d.compatibility_level}` : ''}
      ${d.connector_or_protocol ? ` · ${d.connector_or_protocol}` : ''}`;
    listSection.appendChild(div);
  }
  body.appendChild(listSection);
}

document.getElementById('close-detail').addEventListener('click', () => {
  document.getElementById('detail-panel').classList.remove('open');
  selectedProduct = null;
  document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
});

document.getElementById('search').addEventListener('input', () => renderList());
document.getElementById('sort-select').addEventListener('change', (e) => {
  sortField = e.target.value; renderList();
});

// Load data
(async () => {
  try {
    const base = document.currentScript
      ? new URL('.', document.currentScript.src).href
      : location.href.replace(/[^/]*$/, '');
    const res = await fetch(base + 'data/index.json');
    if (!res.ok) throw new Error(res.statusText);
    allProducts = await res.json();
    document.getElementById('header-count').textContent =
      `${allProducts.length.toLocaleString()} products`;
    document.getElementById('cnt-all').textContent = allProducts.length;
    buildSidebar(allProducts);
    updateBrandFilter(allProducts);
    renderList();
  } catch (err) {
    document.getElementById('loading').innerHTML =
      `<div class="icon">⚠️</div><p>Failed to load data: ${err.message}</p>`;
  }
})();
</script>
</body>
</html>
